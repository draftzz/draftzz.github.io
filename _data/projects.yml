- slug: vesai
  name: VESAI
  type_en: "AI knowledge system"
  type_pt: "Sistema de conhecimento com IA"
  summary_en: "Technical RAG assistant that turns manuals, fault codes, connectors, procedures, and expert knowledge into traceable answers."
  summary_pt: "Assistente técnico com RAG para transformar manuais, códigos de falha, conectores, procedimentos e conhecimento de especialista em respostas rastreáveis."
  tags_en:
    - "RAG"
    - "LLM"
    - "Hybrid search"
    - "Automotive"
  tags_pt:
    - "RAG"
    - "LLM"
    - "Busca híbrida"
    - "Automotivo"
  flow:
    - title_en: "Controlled input"
      title_pt: "Entrada controlada"
      body_en: "The system receives approved technical sources: manuals, procedures, DTC tables, connectors, troubleshooting notes, and internal knowledge bases."
      body_pt: "O sistema recebe documentos técnicos permitidos: manuais, procedimentos, tabelas de DTC, conectores, notas de troubleshooting e bases internas aprovadas."
    - title_en: "Normalization and metadata"
      title_pt: "Normalização e metadados"
      body_en: "Each excerpt receives metadata for system, component, code, model, version, page, and source so retrieval does not depend only on loose text."
      body_pt: "Cada trecho ganha metadados de sistema, componente, código, modelo, versão, página e fonte para que a busca não dependa apenas de texto solto."
    - title_en: "Overlapped chunking"
      title_pt: "Chunking com overlap"
      body_en: "Documents are split into overlapping chunks, preserving the link between failure, cause, procedure, and connector even when the content crosses pages."
      body_pt: "Os documentos são quebrados em trechos com sobreposição. Isso preserva relação entre falha, causa, procedimento e conector mesmo quando o conteúdo cruza páginas."
    - title_en: "Hybrid retrieval"
      title_pt: "Busca híbrida"
      body_en: "DTCs, connectors, and parts use exact matching; human symptom descriptions use semantic search. The result combines technical precision with flexibility."
      body_pt: "DTCs, conectores e peças usam correspondência forte; sintomas em linguagem humana usam busca semântica. O resultado combina precisão técnica com flexibilidade."
    - title_en: "Grounded answer"
      title_pt: "Resposta com fonte"
      body_en: "The model receives only the retrieved excerpts, answers in natural language, and points to the document, section, or page that supports the guidance."
      body_pt: "O modelo recebe apenas os trechos recuperados, responde em linguagem natural e aponta documento, seção ou página que sustentou a orientação."
  architecture_en: "Ingestion pipeline, vector index, metadata filters, lexical search for exact codes, semantic search for symptoms, reranking, and cited generation."
  architecture_pt: "Pipeline de ingestão, índice vetorial, filtros por metadados, busca lexical para códigos exatos, busca semântica para sintomas, reranking e geração com citações."
  impact_en: "Reduces tribal-memory dependency, accelerates diagnostics, and makes each answer auditable. Example: a question about an EBS failure with D10587 retrieves the right procedure and connector context before generating guidance."
  impact_pt: "Reduz dependência de memória tribal, acelera diagnóstico e torna a resposta auditável. Exemplo: uma pergunta sobre falha EBS com D10587 recupera o contexto do procedimento e do conector correto antes de gerar a orientação."

- slug: ecoa
  name: ECOA
  type_en: "Operational control platform"
  type_pt: "Plataforma de controle operacional"
  summary_en: "Operational cockpit that turns scattered problems into structured occurrences, priorities, owners, action plans, and traceable decisions."
  summary_pt: "Cockpit de operação para tirar problemas do improviso: registra ocorrências, organiza prioridades, conecta áreas e transforma decisão em ação rastreável."
  tags_en:
    - "Workflow"
    - "Operations"
    - "Dashboard"
    - "Decision"
  tags_pt:
    - "Workflow"
    - "Operação"
    - "Dashboard"
    - "Decisão"
  flow:
    - title_en: "Event capture"
      title_pt: "Captura do evento"
      body_en: "An occurrence enters with line, department, category, severity, owner, description, and evidence. The input becomes a structured record, not a lost message."
      body_pt: "Uma ocorrência entra com linha, departamento, categoria, severidade, dono, descrição e evidência. A entrada vira registro estruturado, não mensagem perdida."
    - title_en: "Triage and priority"
      title_pt: "Triagem e prioridade"
      body_en: "ECOA classifies impact, urgency, status, and blockers. Priority stops being loose opinion and starts following signals visible to everyone."
      body_pt: "O ECOA classifica impacto, urgência, status e bloqueios. A prioridade deixa de ser opinião solta e passa a seguir sinais visíveis para todo mundo."
    - title_en: "Action plan"
      title_pt: "Plano de ação"
      body_en: "Each problem receives an owner, deadline, history, comments, and next steps. The flow tracks open, in progress, blocked, validated, and completed states."
      body_pt: "Cada problema recebe responsável, prazo, histórico, comentários e próximas etapas. O fluxo acompanha aberto, em andamento, bloqueado, validado e concluído."
    - title_en: "Context views"
      title_pt: "Visão por contexto"
      body_en: "The view changes by line, area, department, user, status, or criticality. Leadership sees the portfolio; executors see the work queue."
      body_pt: "A leitura muda por linha, área, departamento, usuário, status ou criticidade. Liderança enxerga carteira; executores enxergam fila de trabalho."
    - title_en: "Operational memory"
      title_pt: "Memória operacional"
      body_en: "Every important decision is recorded: who owned it, what changed, when it changed, and which evidence supported the conclusion."
      body_pt: "Toda decisão importante fica registrada: quem assumiu, o que mudou, quando mudou e qual evidência sustentou a conclusão."
  architecture_en: "Operations frontend with filters and fast editing, validation/persistence API, data model for users/areas/lines/occurrences/actions, and metrics layer for SLA and trends."
  architecture_pt: "Frontend de operação com filtros e edição rápida, API para validação e persistência, modelo de dados para usuários/áreas/linhas/ocorrências/ações e camada de métricas para SLA e tendência."
  impact_en: "Creates a nervous system for operational routine: less manual follow-up, less context loss, and more clarity on where to act first."
  impact_pt: "Cria um sistema nervoso para rotina operacional: menos follow-up manual, menos perda de contexto e mais clareza sobre onde agir primeiro."

- slug: industrial-analytics
  name: "Industrial Analytics"
  type_en: "Vehicle data product"
  type_pt: "Produto de dados veiculares"
  summary_en: "Tools that turn production and diagnostic data into operational readings: chassis, area, execution, delta, status, and practical recommendation."
  summary_pt: "Ferramentas para transformar dados de produção e diagnóstico em leitura operacional: chassis, área, execução, delta, status e recomendação prática."
  tags_en:
    - "SQL"
    - "Analytics"
    - "Data product"
    - "Factory"
  tags_pt:
    - "SQL"
    - "Analytics"
    - "Produto de dados"
    - "Fábrica"
  flow:
    - title_en: "Chassis lookup"
      title_pt: "Busca por chassis"
      body_en: "The user enters the chassis and the system checks recent executions across areas such as production, revision, and repair."
      body_pt: "O usuário informa o chassis e o sistema consulta execuções recentes em áreas como produção, revisão e repair."
    - title_en: "Signal extraction"
      title_pt: "Extração dos sinais"
      body_en: "Technical logs are filtered to capture charge, discharge, and net discharge, always seeking the latest relevant reading by area."
      body_pt: "Logs técnicos são filtrados para capturar charge, discharge e net discharge, sempre buscando a última leitura relevante por área."
    - title_en: "Delta calculation"
      title_pt: "Cálculo de delta"
      body_en: "The system compares the current area with the previous one to find where battery variation appeared most strongly."
      body_pt: "O sistema compara área atual com área anterior para descobrir onde a variação de bateria apareceu com mais força."
    - title_en: "Classification"
      title_pt: "Classificação"
      body_en: "Configurable thresholds separate normal, recharge, and replace. The user does not need to interpret raw tables to decide."
      body_pt: "Limites configuráveis separam normal, recarregar e trocar. O usuário não precisa interpretar tabela crua para decidir."
    - title_en: "Visualization"
      title_pt: "Visualização"
      body_en: "Bars, metrics, and timeline expose the largest drain, latest value, and status for each step of the production flow."
      body_pt: "Barras, métricas e timeline mostram o maior gasto, último valor e status por etapa do fluxo produtivo."
  architecture_en: "Python application with SQL Server, time-window optimized queries, execution-log parsing, simple HTTP API, and responsive UI for fast diagnostics."
  architecture_pt: "Aplicação Python com SQL Server, consultas otimizadas por janela temporal, parse de logs de execução, API HTTP simples e UI responsiva para diagnóstico rápido."
  impact_en: "Accelerates battery-drain analysis, helps locate the critical area, and turns technical logs into objective operational decisions."
  impact_pt: "Acelera análise de battery drain, ajuda a localizar área crítica e transforma log técnico em decisão operacional objetiva."

- slug: security-lab
  name: "Security Research Lab"
  type_en: "Cybersecurity research"
  type_pt: "Pesquisa em cibersegurança"
  summary_en: "Writeups and experiments in web exploitation, race conditions, hardware, crypto, and mitigation thinking."
  summary_pt: "Biblioteca de writeups e experimentos em web exploitation, race conditions, hardware, crypto e modelagem de mitigação."
  tags_en:
    - "Web security"
    - "Race conditions"
    - "Threat modeling"
    - "Writeups"
  tags_pt:
    - "Web security"
    - "Race conditions"
    - "Modelagem de ameaça"
    - "Writeups"
  flow:
    - title_en: "Reconnaissance"
      title_pt: "Reconhecimento"
      body_en: "I map the surface, data flow, endpoints, assumptions, and boundaries of the application or lab."
      body_pt: "Mapeio superfície, fluxo de dados, endpoints, assumptions e limites da aplicação ou laboratório."
    - title_en: "Hypothesis"
      title_pt: "Hipótese"
      body_en: "I turn technical observation into a testable thesis: TOCTOU, unsafe parsing, late validation, trust boundary, or inconsistent state."
      body_pt: "Transformo observação técnica em uma tese testável: TOCTOU, parsing inseguro, validação tardia, trust boundary ou estado inconsistente."
    - title_en: "Controlled exploit"
      title_pt: "Exploit controlado"
      body_en: "I use payloads, Burp, Turbo Intruder, scripts, and repetition to prove behavior without depending on luck."
      body_pt: "Uso payloads, Burp, Turbo Intruder, scripts e repetição para provar o comportamento sem depender de sorte."
    - title_en: "Remediation"
      title_pt: "Remediação"
      body_en: "Each writeup closes with root cause, mitigation, and reusable learning for secure design."
      body_pt: "Cada writeup fecha com causa raiz, mitigação e aprendizado reutilizável para design seguro."
    - title_en: "Publishing"
      title_pt: "Publicação"
      body_en: "The result becomes bilingual technical text, searchable by tags and separated from the main portfolio."
      body_pt: "O resultado vira texto técnico bilíngue, pesquisável por tags e separado do portfolio principal."
  architecture_en: "Bilingual Jekyll collection with platform/category filters, technique tags, automatic TOC, TechArticle schema, and translation links."
  architecture_pt: "Jekyll collection bilíngue com filtros por plataforma/categoria, tags por técnica, TOC automático, schema TechArticle e links de tradução."
  impact_en: "Keeps the cyber side alive as public proof of technical reasoning without reducing the personal brand to CTF only."
  impact_pt: "Mantém o lado cyber vivo como prova pública de raciocínio técnico, sem reduzir a marca pessoal apenas a CTF."
