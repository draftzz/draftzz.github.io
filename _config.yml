title: Bruno Moreira // Applied Systems Portfolio
tagline: AI Systems · Industrial Software · Automotive Security
description: >-
  Bruno Moreira — applied AI, industrial software, automotive systems, and
  cybersecurity research. Projects include VESAI, ECOA, analytics, and writeups.
author: Bruno Antonio Moreira
email: brunomoreira2712@gmail.com
github_username: draftzz
linkedin: bruno-moreira-6250901b4

baseurl: ""
url: "https://draftzz.github.io"

# === Custom theme (no `theme:` key — using local _layouts/_includes) ===

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
  toc_levels: '2..3'
  auto_ids: true

# Treat /writeups/ and /bugbounty/ as real Jekyll collections
collections:
  writeups:
    output: true
    permalink: /writeups/:name/
  bugbounty:
    output: true
    permalink: /bugbounty/:name/

defaults:
  - scope:
      path: ""
      type: writeups
    values:
      layout: writeup
      lang: en
  - scope:
      path: ""
      type: bugbounty
    values:
      layout: writeup
      lang: en

# Don't process these
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .sass-cache
