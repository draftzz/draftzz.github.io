title: draftzz // CyberSec Portfolio
tagline: CTF Writeups · Web Exploitation · Automotive Security
description: >-
  Bruno Moreira — CSMS Coordinator @ Scania. CTF writeups, web exploitation,
  race conditions, automotive cybersecurity (ISO/SAE 21434, UN R155).
author: Bruno Antonio Moreira
email: brunomoreira2712@gmail.com
github_username: draftzz
linkedin: bruno-moreira-6250901b4

baseurl: ""
url: "https://draftzz.github.io"

# Default language for the site (EN). pt-br versions live at /writeups/<slug>/pt/.
default_lang: en
languages: [en, pt-br]

# === Custom theme (no `theme:` key — using local _layouts/_includes) ===

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
  toc_levels: '2..3'
  auto_ids: true

# Treat /writeups/ and /bugbounty/ as real Jekyll collections
collections:
  writeups:
    output: true
    permalink: /writeups/:name/
  bugbounty:
    output: true
    permalink: /bugbounty/:name/

defaults:
  - scope:
      path: ""
      type: writeups
    values:
      layout: writeup
      lang: en
  - scope:
      path: ""
      type: bugbounty
    values:
      layout: writeup
      lang: en

# Don't process these
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .sass-cache
