<footer class="footer">
  <div class="footer__inner">
    <div class="footer__col">
      <div class="footer__title"># contact</div>
      <a href="mailto:{{ site.email }}">{{ site.email }}</a>
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">github.com/{{ site.github_username }}</a>
      <a href="https://www.linkedin.com/in/{{ site.linkedin }}/" target="_blank" rel="noopener">linkedin/in/{{ site.linkedin }}</a>
    </div>
    <div class="footer__col footer__col--center">
      <div class="footer__title"># build log</div>
      <a href="{{ '/feed.xml' | relative_url }}" title="Atom feed">rss / atom feed</a>
      <a href="{{ '/' | relative_url }}#projects">featured systems</a>
    </div>
    <div class="footer__col footer__col--right">
      <div class="footer__title"># status</div>
      <span class="footer__status"><span class="dot dot--green"></span> active · building applied systems</span>
      <span class="footer__year">© {{ 'now' | date: "%Y" }} Bruno Antonio Moreira</span>
    </div>
  </div>
</footer>

{% include terminal.html %}
<script src="{{ '/assets/js/terminal.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
<script src="{{ '/assets/js/palette.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
<script src="{{ '/assets/js/semantic.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
<script src="{{ '/assets/js/theme.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
<script src="{{ '/assets/js/easter.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
